<!DOCTYPE html>
<html lang="gu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vivekananda AR - Hiren Sharma</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
      model-viewer { width: 100%; height: 75vh; background-color: #ffffff; }
      .container { padding: 20px; text-align: center; }
      #ar-button {
        background-color: #FF5722; color: white; border: none;
        padding: 15px 30px; border-radius: 30px; font-size: 18px;
        font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }
      .audio-btn {
        background-color: #2196F3; color: white; border: none;
        padding: 12px 25px; border-radius: 25px; font-size: 16px;
        margin-top: 15px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <model-viewer 
      src="https://cdn.glitch.global/331a9829-17d4-42f5-93df-5c5f850e029c/Swami_Vivekananda_bust.glb" 
      ar ar-modes="scene-viewer webxr quick-look" 
      camera-controls auto-rotate shadow-intensity="1">
      
      <button slot="ar-button" id="ar-button">
        🚩 સ્વામીજીને ક્લાસમાં જુઓ (AR)
      </button>
    </model-viewer>

    <div class="container">
      <h2>સ્વામી વિવેકાનંદ AR અનુભવ</h2>
      <p>શાળા: વવડી પ્રાથમિક શાળા, ખેડા</p>
      
      <button class="audio-btn" onclick="toggleAudio()">🔊 શિકાગો ભાષણ સાંભળો</button>
      <audio id="speechAudio" src="https://archive.org/download/SwamiVivekanandaSpeechAtChicago/Swami%20Vivekananda%20Speech%20at%20Chicago.mp3"></audio>
    </div>

    <script>
      function toggleAudio() {
        var audio = document.getElementById("speechAudio");
        var btn = document.querySelector(".audio-btn");
        if (audio.paused) {
          audio.play();
          btn.innerHTML = "⏸️ ભાષણ બંધ કરો";
          btn.style.backgroundColor = "#f44336";
        } else {
          audio.pause();
          btn.innerHTML = "🔊 શિકાગો ભાષણ સાંભળો";
          btn.style.backgroundColor = "#2196F3";
        }
      }
    </script>

  </body>
</html>
