<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vivekananda AR - Hiren Sharma</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body { margin: 0; font-family: sans-serif; }
      model-viewer {
        width: 100%;
        height: 80vh; /* સ્ક્રીનનો 80% ભાગ રોકશે */
        background-color: #f0f0f0;
      }
      .controls {
        padding: 20px;
        text-align: center;
      }
      #ar-button {
        background-color: #FF5722;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 20px;
        font-size: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>

    <model-viewer 
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
      ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
      ar 
      ar-modes="scene-viewer webxr quick-look" 
      camera-controls 
      auto-rotate 
      shadow-intensity="1">
      
      <button slot="ar-button" id="ar-button">
        મારા ક્લાસમાં જુઓ (AR)
      </button>
    </model-viewer>

    <div class="controls">
      <h3>સ્વામી વિવેકાનંદ AR અનુભવ</h3>
      <p>જો ઉપર મોડલ દેખાય, તો નારંગી બટન પર ક્લિક કરો.</p>
    </div>

  </body>
</html>
