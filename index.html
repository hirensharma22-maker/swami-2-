<!DOCTYPE html>
<html>
  <head>
    <title>Vivekananda AR - Hiren Sharma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      model-viewer { width: 100%; height: 600px; background-color: #eeeeee; }
      .ar-button {
        background-color: #FF5722; border-radius: 4px; border: none;
        position: absolute; top: 16px; right: 16px; padding: 10px; color: white;
      }
    </style>
  </head>
  <body>

    <model-viewer 
      src="https://cdn.glitch.global/331a9829-17d4-42f5-93df-5c5f850e029c/Swami_Vivekananda_bust.glb" 
      ar ar-modes="webxr scene-viewer quick-look" 
      camera-controls poster="poster.webp" 
      shadow-intensity="1" auto-rotate>
      
      <button slot="ar-button" class="ar-button">
        તમારા ક્લાસમાં જુઓ (AR)
      </button>
    </model-viewer>

    <div style="padding: 20px; text-align: center;">
      <h3>સ્વામી વિવેકાનંદ AR અનુભવ</h3>
      <p>ઉપરના બટન પર ક્લિક કરી 'View in your space' પસંદ કરો.</p>
    </div>

  </body>
</html>
